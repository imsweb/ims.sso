repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.9.10
  hooks:
    # Run the linter.
    - id: ruff
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
- repo: https://github.com/biomejs/pre-commit
  rev: v2.0.0-beta.1 # Use the sha / tag you want to point at
  hooks:
    - id: biome-lint
      exclude: ^.+\.min\.(js|css)|styles.css$
      entry: biome lint --skip=complexity/useArrowFunction
    - id: biome-format
      exclude: ^.+\.min\.(js|css)$
      args: [--indent-style=space, --indent-width=4]
- repo: https://github.com/collective/zpretty
  rev: 3.1.0
  hooks:
    - id: zpretty